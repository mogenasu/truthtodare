{{ define "main" }}

<section class="Gallery">

    <h1>{{ .Title }}</h1>

    <div class="gallery-grid">

        {{ range .Resources.ByType "image" }}

            <img
                src="{{ .RelPermalink }}"
                class="gallery-item"
                loading="lazy"
            >

        {{ end }}

    </div>

</section>



{{ end }}
